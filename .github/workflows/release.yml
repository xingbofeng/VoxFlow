name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build/artifacts
            .build/checkouts
            .build/plugins
            .build/repositories
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Cache sherpa-onnx runtime
        uses: actions/cache@v4
        with:
          path: Vendor/sherpa-onnx.xcframework
          key: ${{ runner.os }}-sherpa-onnx-${{ hashFiles('scripts/bootstrap-sherpa-onnx.sh') }}

      - name: Prepare sherpa-onnx runtime
        run: ./scripts/bootstrap-sherpa-onnx.sh

      - name: Verify release version metadata
        id: version
        run: |
          PLIST_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Sources/VoxFlowApp/Resources/Info.plist)
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            test "$TAG_VERSION" = "$PLIST_VERSION"
          fi
          test -f ".github/release-notes/v${PLIST_VERSION}.md"
          echo "value=$PLIST_VERSION" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test

      - name: Run voice correction benchmark
        run: |
          swift run --package-path Packages/VoxFlowVoiceCorrectionKit VoxFlowVoiceCorrectionBench \
            --fixtures Packages/VoxFlowVoiceCorrectionKit/Benchmarks/Fixtures \
            --baseline Packages/VoxFlowVoiceCorrectionKit/Benchmarks/Baselines/phase1-baseline.json \
            --output .build/voice-correction-benchmark

      - name: Run context boost benchmark
        run: swift run --package-path Packages/VoxFlowContextBoostKit VoxFlowContextBoostBench

      - name: Show Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Check Rust agent router
        working-directory: agent-cli
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test

      - name: Check helper script syntax
        run: |
          bash -n agent-cli/vox

      - name: Check architecture boundaries
        run: make architecture-check

      - name: Build with warnings as errors
        run: swift build -c debug -Xswiftc -warnings-as-errors

      - name: Build release DMG
        run: make dmg

      - name: Verify release assets
        run: |
          codesign --verify --deep --strict .build/VoxFlow.app
          lipo .build/VoxFlow.app/Contents/MacOS/VoxFlow -verify_arch arm64
          shasum -a 256 -c dist/VoxFlow-${{ steps.version.outputs.value }}-macOS.dmg.sha256

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: VoxFlow ${{ steps.version.outputs.value }}
          body_path: .github/release-notes/v${{ steps.version.outputs.value }}.md
          files: |
            dist/VoxFlow-${{ steps.version.outputs.value }}-macOS.dmg
            dist/VoxFlow-${{ steps.version.outputs.value }}-macOS.dmg.sha256
          fail_on_unmatched_files: true
